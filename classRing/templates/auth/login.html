{% extends 'base.html' %}
{% block title %}Login Page{% endblock %}

{% block content %}
<div class="row pt-5 w-50 mx-auto border text-center">
    <form action="{{ url_for('auth.login') }}" method="POST">
        {{ form.csrf_token }}
        <div class="form-group pt-3">
            {{ form.username.label }}
            {{ form.username }}
        </div>
        <div class="form-group pt-3">
            {{ form.password.label }}
            {{ form.password }}
        </div>
        <div class="form-group pt-3">
            {{ form.remember_me() }} {{ form.remember_me.label }}
        </div>        
        <br>
        {{ form.submit }}
    </form>
</div>
{% endblock %}
